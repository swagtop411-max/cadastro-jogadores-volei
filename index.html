<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Vôlei</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #fff;
}

.header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* DASHBOARD */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.card-dashboard {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

/* FORM */
.form {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  display: grid;
  gap: 10px;
}

input, select, textarea {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: #22c55e;
}

.btn-edit {
  background: #facc15;
}

.btn-danger {
  background: #ef4444;
}

/* JOGADORES */
.card {
  background: #1e293b;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  gap: 15px;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 10px;
  object-fit: cover;
}

.ranking {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">🏐 Dashboard de Jogadores</div>

<div class="container">

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="card-dashboard" id="total"></div>
    <div class="card-dashboard" id="media"></div>
    <div class="card-dashboard" id="melhor"></div>
  </div>

  <!-- FORM -->
  <form id="formJogador" class="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="time" placeholder="Time" required>

    <select id="nivel">
      <option>Iniciante</option>
      <option>Intermediário</option>
      <option>Avançado</option>
    </select>

    <textarea id="historico" placeholder="Histórico"></textarea>
    <input type="file" id="foto">

    <button class="btn" id="btnSalvar">Cadastrar Jogador</button>
  </form>

  <!-- RANKING -->
  <div class="ranking" id="ranking"></div>

  <!-- LISTA -->
  <div id="listaJogadores"></div>

</div>

<script>
let jogadores = JSON.parse(localStorage.getItem("jogadores")) || [];
let editIndex = null;

const form = document.getElementById("formJogador");
const btnSalvar = document.getElementById("btnSalvar");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const time = document.getElementById("time").value;
  const nivel = document.getElementById("nivel").value;
  const historico = document.getElementById("historico").value;
  const fotoInput = document.getElementById("foto");

  const salvarJogador = (fotoBase64="") => {

    if (editIndex !== null) {
      jogadores[editIndex] = {
        ...jogadores[editIndex],
        nome, time, nivel, historico,
        foto: fotoBase64 || jogadores[editIndex].foto
      };
      editIndex = null;
      btnSalvar.textContent = "Cadastrar Jogador";
    } else {
      jogadores.push({
        nome, time, nivel, historico,
        foto: fotoBase64,
        avaliacoes: []
      });
    }

    salvar();
    renderizar();
    form.reset();
  };

  if (fotoInput.files[0]) {
    const reader = new FileReader();
    reader.onload = () => salvarJogador(reader.result);
    reader.readAsDataURL(fotoInput.files[0]);
  } else {
    salvarJogador();
  }
});

function salvar() {
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

function media(avaliacoes) {
  if (!avaliacoes.length) return 0;
  return (avaliacoes.reduce((a,b)=>a+b,0)/avaliacoes.length);
}

function renderizar() {
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = "";

  jogadores.forEach((j, i) => {
    lista.innerHTML += `
      <div class="card">
        <img src="${j.foto || 'https://via.placeholder.com/100'}">
        <div>
          <h3>${j.nome}</h3>
          <p>🏐 ${j.time}</p>
          <p>${j.nivel}</p>

          <input type="number" min="1" max="5" id="nota${i}">
          <button class="btn" onclick="avaliar(${i})">Avaliar</button>

          <p>Média: ${media(j.avaliacoes).toFixed(1)}</p>

          <button class="btn-edit" onclick="editar(${i})">Editar</button>
          <button class="btn-danger" onclick="excluir(${i})">Excluir</button>
        </div>
      </div>
    `;
  });

  atualizarDashboard();
  atualizarRanking();
}

function avaliar(i) {
  const nota = document.getElementById(`nota${i}`).value;
  if (nota) {
    jogadores[i].avaliacoes.push(Number(nota));
    salvar();
    renderizar();
  }
}

function editar(i) {
  const j = jogadores[i];

  document.getElementById("nome").value = j.nome;
  document.getElementById("time").value = j.time;
  document.getElementById("nivel").value = j.nivel;
  document.getElementById("historico").value = j.historico;

  editIndex = i;
  btnSalvar.textContent = "Atualizar Jogador";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function excluir(i) {
  if (confirm("Excluir jogador?")) {
    jogadores.splice(i,1);
    salvar();
    renderizar();
  }
}

function atualizarDashboard() {
  document.getElementById("total").innerHTML =
    `<h2>${jogadores.length}</h2><p>Jogadores</p>`;

  const medias = jogadores.map(j => media(j.avaliacoes));
  const mediaGeral = medias.length ? (medias.reduce((a,b)=>a+b,0)/medias.length).toFixed(1) : 0;

  document.getElementById("media").innerHTML =
    `<h2>${mediaGeral}</h2><p>Média Geral</p>`;

  const melhor = [...jogadores].sort((a,b)=>media(b.avaliacoes)-media(a.avaliacoes))[0];

  document.getElementById("melhor").innerHTML =
    melhor ? `<h2>${melhor.nome}</h2><p>Melhor Jogador</p>` : `<p>Sem dados</p>`;
}

function atualizarRanking() {
  const ranking = document.getElementById("ranking");

  const ordenado = [...jogadores].sort((a,b)=>media(b.avaliacoes)-media(a.avaliacoes));

  ranking.innerHTML = "<h2>🏆 Ranking</h2>";

  ordenado.forEach((j,i)=>{
    ranking.innerHTML += `<p>${i+1}º - ${j.nome} (${media(j.avaliacoes).toFixed(1)})</p>`;
  });
}

renderizar();
</script>

</body>
</html>
