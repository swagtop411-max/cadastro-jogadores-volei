<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão de Jogadores de Vôlei</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: #fff;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h1, h2 {
  text-align: center;
}

.form {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
  display: grid;
  gap: 10px;
}

input, select, textarea {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: #00c6ff;
}

.btn-danger {
  background: #ff4d4d;
  color: #fff;
}

.btn-edit {
  background: #ffc107;
}

.card {
  background: rgba(255,255,255,0.1);
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  gap: 15px;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 10px;
  object-fit: cover;
}

.stats {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
}

.ranking {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏐 Gestão de Jogadores</h1>

  <form id="formJogador" class="form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="time" placeholder="Time" required>

    <select id="nivel">
      <option>Iniciante</option>
      <option>Intermediário</option>
      <option>Avançado</option>
    </select>

    <textarea id="historico" placeholder="Histórico de times"></textarea>
    <input type="file" id="foto">

    <button class="btn" type="submit">Salvar Jogador</button>
  </form>

  <div class="stats" id="estatisticas"></div>
  <div class="ranking" id="ranking"></div>
  <div id="listaJogadores"></div>
</div>

<script>
let jogadores = JSON.parse(localStorage.getItem("jogadores")) || [];
let editIndex = null;

const form = document.getElementById("formJogador");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const time = document.getElementById("time").value;
  const nivel = document.getElementById("nivel").value;
  const historico = document.getElementById("historico").value;
  const fotoInput = document.getElementById("foto");

  const salvarJogador = (fotoBase64="") => {
    const jogador = {
      nome,
      time,
      nivel,
      historico,
      foto: fotoBase64,
      avaliacoes: editIndex !== null ? jogadores[editIndex].avaliacoes : []
    };

    if (editIndex !== null) {
      jogadores[editIndex] = jogador;
      editIndex = null;
    } else {
      jogadores.push(jogador);
    }

    salvar();
    renderizar();
    form.reset();
  };

  if (fotoInput.files[0]) {
    const reader = new FileReader();
    reader.onload = () => salvarJogador(reader.result);
    reader.readAsDataURL(fotoInput.files[0]);
  } else {
    salvarJogador();
  }
});

function salvar() {
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

function media(avaliacoes) {
  if (avaliacoes.length === 0) return 0;
  return (avaliacoes.reduce((a,b)=>a+b,0)/avaliacoes.length);
}

function renderizar() {
  const lista = document.getElementById("listaJogadores");
  lista.innerHTML = "";

  jogadores.forEach((j, index) => {
    lista.innerHTML += `
      <div class="card">
        <img src="${j.foto || 'https://via.placeholder.com/100'}">
        <div>
          <h3>${j.nome}</h3>
          <p><b>Time:</b> ${j.time}</p>
          <p><b>Nível:</b> ${j.nivel}</p>
          <p><b>Histórico:</b> ${j.historico}</p>

          <input type="number" min="1" max="5" id="nota${index}">
          <button class="btn" onclick="avaliar(${index})">Avaliar</button>

          <p><b>Média:</b> ${media(j.avaliacoes).toFixed(1)}</p>

          <button class="btn-edit" onclick="editar(${index})">Editar</button>
          <button class="btn-danger" onclick="excluir(${index})">Excluir</button>
        </div>
      </div>
    `;
  });

  atualizarStats();
  atualizarRanking();
}

function avaliar(index) {
  const nota = document.getElementById(`nota${index}`).value;
  if (nota) {
    jogadores[index].avaliacoes.push(Number(nota));
    salvar();
    renderizar();
  }
}

function excluir(index) {
  if (confirm("Excluir jogador?")) {
    jogadores.splice(index,1);
    salvar();
    renderizar();
  }
}

function editar(index) {
  const j = jogadores[index];
  document.getElementById("nome").value = j.nome;
  document.getElementById("time").value = j.time;
  document.getElementById("nivel").value = j.nivel;
  document.getElementById("historico").value = j.historico;
  editIndex = index;
}

function atualizarStats() {
  const total = jogadores.length;
  const medias = jogadores.map(j => media(j.avaliacoes));
  const mediaGeral = medias.length ? (medias.reduce((a,b)=>a+b,0)/medias.length).toFixed(1) : 0;

  document.getElementById("estatisticas").innerHTML = `
    <h2>📊 Estatísticas</h2>
    <p>Total de jogadores: ${total}</p>
    <p>Média geral: ${mediaGeral}</p>
  `;
}

function atualizarRanking() {
  const rankingDiv = document.getElementById("ranking");

  const ordenado = [...jogadores].sort((a,b)=> media(b.avaliacoes) - media(a.avaliacoes));

  rankingDiv.innerHTML = "<h2>🏆 Ranking</h2>";

  ordenado.forEach((j,i)=>{
    rankingDiv.innerHTML += `<p>${i+1}º - ${j.nome} (${media(j.avaliacoes).toFixed(1)})</p>`;
  });
}

renderizar();
</script>

</body>
</html>
