<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Vôlei</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">🏐 Dashboard de Jogadores</div>

<div class="container">

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="card-dashboard" id="total"></div>
    <div class="card-dashboard" id="media"></div>
    <div class="card-dashboard" id="melhor"></div>
  </div>

  <!-- BUSCA -->
  <input type="text" id="busca" placeholder="🔍 Buscar jogador...">

  <!-- FILTRO -->
  <select id="filtroNivel">
    <option value="">Todos níveis</option>
    <option>Iniciante</option>
    <option>Intermediário</option>
    <option>Avançado</option>
  </select>

  <!-- FORM -->
  <form id="formJogador" class="form">

    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="time" placeholder="Time atual" required>
    <input type="text" id="categoria" placeholder="Categoria do time">

    <select id="nivel">
      <option>Iniciante</option>
      <option>Intermediário</option>
      <option>Avançado</option>
    </select>

    <!-- TIMES DINÂMICOS -->
    <div id="timesContainer">
      <label>Times que já jogou:</label>

      <div class="time-item">
        <input type="text" placeholder="Nome do time" class="timeNome">
        <select class="timeNivel">
          <option>Iniciante</option>
          <option>Intermediário</option>
          <option>Livre</option>
        </select>
      </div>
    </div>

    <button type="button" onclick="adicionarTime()">+ Adicionar outro time</button>

    <!-- FOTO -->
    <input type="file" id="foto" accept="image/*">
    <img id="preview" style="width:100px; display:none; margin-top:10px;">

    <button id="btnSalvar">Cadastrar Jogador</button>
  </form>

  <!-- RANKING -->
  <div id="ranking"></div>

  <!-- LISTA -->
  <div id="listaJogadores"></div>

</div>

<script src="script.js"></script>
</body>
</html>
